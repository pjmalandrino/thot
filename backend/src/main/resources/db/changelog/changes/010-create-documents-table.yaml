databaseChangeLog:
  - changeSet:
      id: 010-create-documents-table
      author: developer
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_document_conversation
                    references: conversations(id)
              - column:
                  name: filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: page_count
                  type: INT
              - column:
                  name: char_count
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: extracted_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
