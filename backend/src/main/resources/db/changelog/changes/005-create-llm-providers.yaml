databaseChangeLog:
  - changeSet:
      id: 005-create-llm-providers
      author: developer
      changes:
        - createTable:
            tableName: llm_providers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: base_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: true
              - column:
                  name: api_key
                  type: VARCHAR(500)
                  constraints:
                    nullable: true
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
