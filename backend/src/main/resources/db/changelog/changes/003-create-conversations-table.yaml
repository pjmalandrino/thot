databaseChangeLog:
  - changeSet:
      id: 003-create-conversations-table
      author: developer
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - delete:
            tableName: llm_interactions
        - addColumn:
            tableName: llm_interactions
            columns:
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_interaction_conversation
                    references: conversations(id)
