databaseChangeLog:
  - changeSet:
      id: 002-create-llm-interactions-table
      author: developer
      changes:
        - createTable:
            tableName: llm_interactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: prompt
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: response
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
