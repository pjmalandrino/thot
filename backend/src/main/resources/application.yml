server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/chatinterface
    username: app
    password: app
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/chat-app/protocol/openid-connect/certs

app:
  keycloak:
    issuer-uri: http://localhost:8080/realms/chat-app

llm:
  provider: ollama

ollama:
  base-url: http://host.docker.internal:11434
  model: llama3.2:3b

mistral:
  api-key: ${MISTRAL_API_KEY:}
  model: mistral-small-latest

context-engine:
  base-url: http://context-engine:8082

document-parser:
  base-url: http://localhost:8000

document:
  max-content-length: 8000

google:
  drive:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: http://localhost:8081/api/drive/callback
    frontend-redirect-uri: http://localhost:3000
    max-search-results: 10
    max-extract-files: 3
    max-content-length: 4000
