server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/chatinterface
    username: app
    password: app
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/chat-app/protocol/openid-connect/certs

app:
  keycloak:
    issuer-uri: http://localhost:8080/realms/chat-app

ollama:
  base-url: http://host.docker.internal:11434
  model: llama3.2:3b
